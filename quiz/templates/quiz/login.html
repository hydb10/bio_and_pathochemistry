{% extends 'quiz/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="card p-4">
    <h2 class="text-white">Вход</h2>

    <form method="post">
        {% csrf_token %}
        <input class="form-control mb-2" type="text" name="username" placeholder="Введите ник">
        <button class="btn btn-primary">Войти</button>
    </form>

    {% if error %}
    <p class="text-danger mt-2">{{ error }}</p>
    {% endif %}
</div>
{% endblock %}
